<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFV Virtual Firewall UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const RULES = [
      { name: "Block Malicious IP", action: "BLOCK", priority: 1, src_ip: "10.0.0.99" },
      { name: "Block Suspicious Subnet", action: "BLOCK", priority: 2, subnet: "10.10.0.0/16" },
      { name: "Block External SSH", action: "BLOCK", priority: 3, port: 22, protocol: "TCP", subnet: "203.0.113.0/24" },
      { name: "Allow HTTPS", action: "ALLOW", priority: 5, port: 443, protocol: "TCP" },
      { name: "Allow HTTP", action: "ALLOW", priority: 6, port: 80, protocol: "TCP" },
      { name: "Allow DNS", action: "ALLOW", priority: 7, port: 53, protocol: "UDP" },
      { name: "Allow Internal Network", action: "ALLOW", priority: 8, subnet: "192.168.0.0/16" },
      { name: "Block Midnight UDP Traffic", action: "BLOCK", priority: 10, protocol: "UDP", time_range: [0, 6] },
      { name: "Block Telnet", action: "BLOCK", priority: 15, port: 23, protocol: "TCP" },
      { name: "Allow Admin SSH", action: "ALLOW", priority: 20, port: 22, protocol: "TCP", subnet: "192.168.1.0/24" }
    ].sort((a, b) => a.priority - b.priority);

    const TEST_CASES = [
      { label: "TC1 | Known malicious IP trying to connect", src_ip: "10.0.0.99", port: 80, protocol: "TCP" },
      { label: "TC2 | Suspicious subnet traffic", src_ip: "10.10.5.22", port: 443, protocol: "TCP" },
      { label: "TC3 | Normal HTTPS web request from public internet", src_ip: "8.8.8.8", port: 443, protocol: "TCP" },
      { label: "TC4 | HTTP request (should be allowed)", src_ip: "172.16.0.5", port: 80, protocol: "TCP" },
      { label: "TC5 | Internal SSH from admin machine", src_ip: "192.168.1.10", port: 22, protocol: "TCP" },
      { label: "TC6 | External SSH brute-force attempt", src_ip: "203.0.113.55", port: 22, protocol: "TCP" },
      { label: "TC7 | Telnet connection (insecure, should be blocked)", src_ip: "192.168.2.3", port: 23, protocol: "TCP" },
      { label: "TC8 | DNS query from any host", src_ip: "10.20.1.1", port: 53, protocol: "UDP" }
    ];

    function ipToInt(ip) {
      const parts = ip.split(".").map(Number);
      if (parts.length !== 4 || parts.some((n) => Number.isNaN(n) || n < 0 || n > 255)) {
        return null;
      }
      return ((parts[0] << 24) >>> 0) + ((parts[1] << 16) >>> 0) + ((parts[2] << 8) >>> 0) + (parts[3] >>> 0);
    }

    function isIpInSubnet(ip, subnet) {
      const [networkIp, prefixRaw] = subnet.split("/");
      const prefix = Number(prefixRaw);
      const ipInt = ipToInt(ip);
      const networkInt = ipToInt(networkIp);

      if (ipInt === null || networkInt === null || Number.isNaN(prefix) || prefix < 0 || prefix > 32) {
        return false;
      }

      const mask = prefix === 0 ? 0 : (0xffffffff << (32 - prefix)) >>> 0;
      return (ipInt & mask) === (networkInt & mask);
    }

    function ruleMatches(rule, packet) {
      if (rule.src_ip && rule.src_ip !== packet.src_ip) return false;
      if (rule.port && Number(rule.port) !== Number(packet.port)) return false;
      if (rule.protocol && rule.protocol.toUpperCase() !== packet.protocol.toUpperCase()) return false;

      if (rule.subnet && !isIpInSubnet(packet.src_ip, rule.subnet)) {
        return false;
      }

      if (rule.time_range) {
        const currentHour = new Date().getHours();
        const [start, end] = rule.time_range;
        let inRange = false;
        if (start <= end) {
          inRange = currentHour >= start && currentHour < end;
        } else {
          inRange = currentHour >= start || currentHour < end;
        }
        if (!inRange) return false;
      }

      return true;
    }

    function evaluatePacket(packet) {
      const matched = RULES.find((rule) => ruleMatches(rule, packet));
      if (matched) {
        return { decision: matched.action, matchedRule: matched.name };
      }
      return { decision: "BLOCK", matchedRule: "DEFAULT POLICY" };
    }

    function badgeClass(action) {
      return action === "ALLOW"
        ? "bg-emerald-500/15 text-emerald-300 border-emerald-400/50"
        : "bg-rose-500/15 text-rose-300 border-rose-400/50";
    }

    function App() {
      const [form, setForm] = React.useState({ src_ip: "", port: "", protocol: "TCP" });
      const [decision, setDecision] = React.useState(null);
      const [history, setHistory] = React.useState([]);

      const onChange = (event) => {
        const { name, value } = event.target;
        setForm((prev) => ({ ...prev, [name]: value }));
      };

      const validateForm = () => {
        if (!form.src_ip || ipToInt(form.src_ip) === null) {
          return "Please enter a valid source IPv4 address.";
        }
        const portNumber = Number(form.port);
        if (!Number.isInteger(portNumber) || portNumber < 0 || portNumber > 65535) {
          return "Port must be an integer between 0 and 65535.";
        }
        if (!form.protocol) {
          return "Protocol is required.";
        }
        return null;
      };

      const runSinglePacket = (packet, label = "Manual Test") => {
        const result = evaluatePacket(packet);
        const record = {
          label,
          packet,
          decision: result.decision,
          matchedRule: result.matchedRule,
          at: new Date().toLocaleTimeString()
        };
        setDecision(record);
        setHistory((prev) => [record, ...prev].slice(0, 30));
      };

      const onSubmit = (event) => {
        event.preventDefault();
        const err = validateForm();
        if (err) {
          alert(err);
          return;
        }
        runSinglePacket({
          src_ip: form.src_ip.trim(),
          port: Number(form.port),
          protocol: form.protocol.toUpperCase()
        });
      };

      const runAllTests = () => {
        const results = TEST_CASES.map((tc) => {
          const result = evaluatePacket(tc);
          return {
            label: tc.label,
            packet: tc,
            decision: result.decision,
            matchedRule: result.matchedRule,
            at: new Date().toLocaleTimeString()
          };
        }).reverse();

        setDecision(results[results.length - 1]);
        setHistory((prev) => [...results, ...prev].slice(0, 30));
      };

      const clearHistory = () => {
        setHistory([]);
        setDecision(null);
      };

      return (
        <main className="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
          <header className="mb-8 rounded-2xl border border-slate-700 bg-slate-900/70 p-6">
            <h1 className="text-2xl font-bold sm:text-3xl">NFV Virtual Firewall UI</h1>
            <p className="mt-2 text-sm text-slate-300">
              React + Tailwind interactive dashboard for testing packet decisions.
            </p>
          </header>

          <section className="grid gap-6 lg:grid-cols-2">
            <div className="rounded-2xl border border-slate-700 bg-slate-900/70 p-5">
              <h2 className="text-lg font-semibold">Interactive Packet Test</h2>
              <form onSubmit={onSubmit} className="mt-4 space-y-4">
                <div>
                  <label className="block text-sm text-slate-300">Source IP</label>
                  <input
                    name="src_ip"
                    value={form.src_ip}
                    onChange={onChange}
                    placeholder="192.168.1.10"
                    className="mt-1 w-full rounded-lg border border-slate-600 bg-slate-950 px-3 py-2 outline-none ring-indigo-500 focus:ring"
                  />
                </div>
                <div>
                  <label className="block text-sm text-slate-300">Port</label>
                  <input
                    name="port"
                    value={form.port}
                    onChange={onChange}
                    placeholder="443"
                    className="mt-1 w-full rounded-lg border border-slate-600 bg-slate-950 px-3 py-2 outline-none ring-indigo-500 focus:ring"
                  />
                </div>
                <div>
                  <label className="block text-sm text-slate-300">Protocol</label>
                  <select
                    name="protocol"
                    value={form.protocol}
                    onChange={onChange}
                    className="mt-1 w-full rounded-lg border border-slate-600 bg-slate-950 px-3 py-2 outline-none ring-indigo-500 focus:ring"
                  >
                    <option>TCP</option>
                    <option>UDP</option>
                    <option>ICMP</option>
                    <option>HTTP</option>
                    <option>HTTPS</option>
                    <option>FTP</option>
                    <option>SSH</option>
                  </select>
                </div>

                <div className="flex flex-wrap gap-3 pt-2">
                  <button type="submit" className="rounded-lg bg-indigo-500 px-4 py-2 text-sm font-medium hover:bg-indigo-400">
                    Evaluate Packet
                  </button>
                  <button type="button" onClick={runAllTests} className="rounded-lg bg-cyan-600 px-4 py-2 text-sm font-medium hover:bg-cyan-500">
                    Run All Test Cases
                  </button>
                  <button type="button" onClick={clearHistory} className="rounded-lg border border-slate-600 px-4 py-2 text-sm font-medium hover:bg-slate-800">
                    Clear Results
                  </button>
                </div>
              </form>

              <div className="mt-6 rounded-xl border border-slate-700 bg-slate-950 p-4">
                <h3 className="text-sm font-semibold text-slate-300">Latest Decision</h3>
                {!decision && <p className="mt-2 text-sm text-slate-400">No packet evaluated yet.</p>}
                {decision && (
                  <div className="mt-3 space-y-2 text-sm">
                    <p><span className="text-slate-400">Packet:</span> {decision.packet.src_ip}:{decision.packet.port} ({decision.packet.protocol})</p>
                    <p><span className="text-slate-400">Rule:</span> {decision.matchedRule}</p>
                    <p className="flex items-center gap-2">
                      <span className="text-slate-400">Decision:</span>
                      <span className={`rounded-full border px-2.5 py-0.5 text-xs font-semibold ${badgeClass(decision.decision)}`}>
                        {decision.decision}
                      </span>
                    </p>
                  </div>
                )}
              </div>
            </div>

            <div className="rounded-2xl border border-slate-700 bg-slate-900/70 p-5">
              <h2 className="text-lg font-semibold">Loaded Rules (Priority Order)</h2>
              <div className="mt-4 max-h-[430px] overflow-auto rounded-lg border border-slate-700">
                <table className="min-w-full divide-y divide-slate-700 text-sm">
                  <thead className="bg-slate-800">
                    <tr>
                      <th className="px-3 py-2 text-left font-medium">Priority</th>
                      <th className="px-3 py-2 text-left font-medium">Name</th>
                      <th className="px-3 py-2 text-left font-medium">Action</th>
                      <th className="px-3 py-2 text-left font-medium">Conditions</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-800">
                    {RULES.map((rule) => {
                      const conditions = [
                        rule.src_ip ? `IP=${rule.src_ip}` : null,
                        rule.subnet ? `Subnet=${rule.subnet}` : null,
                        rule.port ? `Port=${rule.port}` : null,
                        rule.protocol ? `Protocol=${rule.protocol}` : null,
                        rule.time_range ? `Time=${rule.time_range[0]}-${rule.time_range[1]}` : null
                      ].filter(Boolean).join(", ") || "ANY";

                      return (
                        <tr key={rule.name}>
                          <td className="px-3 py-2">{rule.priority}</td>
                          <td className="px-3 py-2">{rule.name}</td>
                          <td className="px-3 py-2">
                            <span className={`rounded-full border px-2.5 py-0.5 text-xs font-semibold ${badgeClass(rule.action)}`}>
                              {rule.action}
                            </span>
                          </td>
                          <td className="px-3 py-2 text-slate-300">{conditions}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </section>

          <section className="mt-6 rounded-2xl border border-slate-700 bg-slate-900/70 p-5">
            <h2 className="text-lg font-semibold">Recent Evaluations</h2>
            <p className="mt-1 text-sm text-slate-400">Shows up to 30 latest packet decisions.</p>
            <div className="mt-4 max-h-[350px] overflow-auto rounded-lg border border-slate-700">
              <table className="min-w-full divide-y divide-slate-700 text-sm">
                <thead className="bg-slate-800">
                  <tr>
                    <th className="px-3 py-2 text-left font-medium">Time</th>
                    <th className="px-3 py-2 text-left font-medium">Scenario</th>
                    <th className="px-3 py-2 text-left font-medium">Packet</th>
                    <th className="px-3 py-2 text-left font-medium">Matched Rule</th>
                    <th className="px-3 py-2 text-left font-medium">Decision</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-800">
                  {history.length === 0 && (
                    <tr>
                      <td colSpan="5" className="px-3 py-4 text-center text-slate-400">
                        No entries yet. Evaluate a packet to see results here.
                      </td>
                    </tr>
                  )}
                  {history.map((item, idx) => (
                    <tr key={`${item.label}-${idx}`}>
                      <td className="px-3 py-2">{item.at}</td>
                      <td className="px-3 py-2">{item.label}</td>
                      <td className="px-3 py-2">{item.packet.src_ip}:{item.packet.port} ({item.packet.protocol})</td>
                      <td className="px-3 py-2">{item.matchedRule}</td>
                      <td className="px-3 py-2">
                        <span className={`rounded-full border px-2.5 py-0.5 text-xs font-semibold ${badgeClass(item.decision)}`}>
                          {item.decision}
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </section>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
